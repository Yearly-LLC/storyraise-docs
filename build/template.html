<!DOCTYPE html>
<html lang="en">
<head>
{{HEAD}}
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo-group">
      <a href="/" class="logo">
        <img
          class="logo-light"
          src="https://firebasestorage.googleapis.com/v0/b/yearly-bv3.appspot.com/o/Qv5LVkDakgLMEIxCotpz%2Flogos%2Ffile_9s8OW_Storyraise%20%E2%80%94%20Logos_Storyraise%20Logo%20%E2%80%94%20Heavy%20Icon%20Black%20Text.svg?alt=media&token=d6cf5dd9-6a30-4050-a94d-955bcd6c534a"
          alt="Storyraise"
        />
        <img class="logo-dark" src="/assets/logo-dark.svg" alt="Storyraise" />
      </a>
      <span>Knowledge Base</span>
    </div>
    <div class="nav-right">
      {{NAV_SEARCH}}
      <input type="checkbox" id="navmenu" class="navmenu-cb" hidden />
      <label for="navmenu" class="navmenu-btn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </label>
      <div class="nav-menu">
      <a href="https://storyraise.com" class="nav-link">Home</a>
      <a href="https://storyraise.com/support" class="nav-link">Support</a>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to dark theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <a href="https://app.storyraise.com" class="nav-cta">Sign In</a>
      </div>
    </div>
  </nav>

  <!-- LAYOUT: sidebar tree + main column -->
  <div class="layout">
    <input type="checkbox" id="navtoggle" class="navtoggle-cb" hidden />

    <!-- SIDEBAR -->
    {{SIDENAV_BLOCK}}

    <!-- MAIN -->
    <div class="doc-main">
      {{DOCNAV_TOGGLE}}

      <!-- BREADCRUMB -->
      <div class="breadcrumb">
        {{BREADCRUMB}}
      </div>

      <!-- CONTENT -->
      <div class="content">
        {{BODY}}

        <hr />

        <p style="font-size:0.85rem; color:var(--text-faint);">Need help? <a href="https://storyraise.com/support">Contact our support team</a>.</p>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    &copy; 2026 Storyraise Technology Inc. &nbsp;&mdash;&nbsp;
    <a href="https://storyraise.com">storyraise.com</a> &nbsp;&middot;&nbsp;
    <a href="https://storyraise.com/privacy-policy">Privacy Policy</a> &nbsp;&middot;&nbsp;
    <a href="https://storyraise.com/terms-conditions">Terms &amp; Conditions</a>
  </footer>

  <script src="/assets/theme.js"></script>
  <script src="/search-index.js"></script>
  <script src="/assets/minisearch.min.js"></script>
  <script src="/assets/search-core.js"></script>
  <script src="{{SEARCH_SCRIPT}}"></script>
</body>
</html>

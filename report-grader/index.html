// Broad video platform pattern — matches URLs, class names, data attributes, script names
const VIDEO_PLATFORM_RE = /youtube\.com|youtu\.be|vimeo\.com|wistia\.(com|net)|loom\.com|kaltura\.com|brightcove\.(com|net)|vidyard\.com|sproutvideo\.com|jwplatform\.com|jwplayer\.com|dailymotion\.com|streamable\.com|bunny\.net\/embed|videopress\.com|vzaar\.com|spotlightr\.com|vidizmo\.com/i;

// Thumbnail / poster URLs that only exist when a video is present
const VIDEO_THUMB_RE = /img\.youtube\.com\/vi\/|i\.ytimg\.com\/vi\/|i\.vimeocdn\.com\/video\/|i3\.ytimg\.com\/vi\//i;

function detectVideo(doc, raw) {
  if (!raw && !doc) return { found: false, signal: null };

  // ── 1. Raw HTML string — catches lazy-loaded & JS-rendered embeds ────────
  if (raw) {
    if (VIDEO_PLATFORM_RE.test(raw))  return { found: true, signal: 'platform URL in source' };
    if (/<video[\s>]/i.test(raw))     return { found: true, signal: '<video> tag in source' };
    if (VIDEO_THUMB_RE.test(raw))     return { found: true, signal: 'video thumbnail in source' };
  }

  if (!doc) return { found: false, signal: null };

  // ── 2. Native <video> element ────────────────────────────────────────────
  if (doc.querySelector('video'))
    return { found: true, signal: '<video> element' };

  // ── 3. Iframes — check every possible src/lazy attribute ────────────────
  for (const f of doc.querySelectorAll('iframe')) {
    const candidates = [
      f.getAttribute('src'), f.getAttribute('data-src'),
      f.getAttribute('data-lazy-src'), f.getAttribute('data-original'),
      f.getAttribute('data-url'), f.getAttribute('data-embed'),
    ].filter(Boolean).join(' ');
    if (VIDEO_PLATFORM_RE.test(candidates))
      return { found: true, signal: 'iframe embed' };
  }

  // ── 4. <embed> / <object> ────────────────────────────────────────────────
  for (const e of doc.querySelectorAll('embed, object')) {
    const src = e.getAttribute('src') || e.getAttribute('data') || '';
    if (/\.(mp4|webm|ogg|mov|flv)/i.test(src) || VIDEO_PLATFORM_RE.test(src))
      return { found: true, signal: 'embed/object tag' };
  }

  // ── 5. Images — YouTube/Vimeo thumbnails mean a video is present ─────────
  for (const img of doc.querySelectorAll('img[src],img[data-src]')) {
    const src = img.getAttribute('src') || img.getAttribute('data-src') || '';
    if (VIDEO_THUMB_RE.test(src))
      return { found: true, signal: 'video thumbnail image' };
  }

  // ── 6. Anchors linking to a video platform ───────────────────────────────
  for (const a of doc.querySelectorAll('a[href]')) {
    if (VIDEO_PLATFORM_RE.test(a.getAttribute('href') || ''))
      return { found: true, signal: 'link to video platform' };
  }

  // ── 7. Meta tags (og:video, twitter:player) ──────────────────────────────
  for (const m of doc.querySelectorAll('meta[property],meta[name]')) {
    const prop    = m.getAttribute('property') || m.getAttribute('name') || '';
    const content = m.getAttribute('content') || '';
    if (/og:video|twitter:player/i.test(prop) && content)
      return { found: true, signal: 'og:video meta tag' };
  }

  // ── 8. JSON-LD VideoObject schema ────────────────────────────────────────
  for (const s of doc.querySelectorAll('script[type="application/ld+json"]')) {
    try {
      const str = JSON.stringify(JSON.parse(s.textContent || '{}'));
      if (/VideoObject|embedUrl|contentUrl/i.test(str))
        return { found: true, signal: 'JSON-LD VideoObject' };
    } catch (_) {}
  }

  // ── 9. Data attributes / class names used by popular embed widgets ────────
  const dataAttrSel = [
    '[data-video-id]','[data-wistia-id]','[data-plyr-provider]',
    '[data-vimeo-id]','[data-youtube-id]','[class*="wistia_embed"]',
    '[class*="vidyard"]','[class*="loom-embed"]','[class*="yt-lite"]',
    '[id*="wistia"]','[id*="vimeo-"]','[class*="wp-block-embed__wrapper"]',
  ].join(',');
  if (doc.querySelector(dataAttrSel))
    return { found: true, signal: 'video widget attribute' };

  // ── 10. Script src loading a known player SDK ────────────────────────────
  for (const s of doc.querySelectorAll('script[src]')) {
    if (VIDEO_PLATFORM_RE.test(s.getAttribute('src') || ''))
      return { found: true, signal: 'player SDK script' };
  }

  // ── 11. Inline script text — player init code & JSON config ─────────────
  const PLAYER_INIT_RE = /YT\.Player|Vimeo\.Player|wistiaEmbed|_wq\s*=|vidyard\.api|brightcove\.createVideo|jwplayer\s*\(|kaltura\.kWidget|loom\.setup|bunny\.net\/embed/i;
  // Video IDs stored in JS config objects (even when iframe is JS-injected)
  const VIDEO_ID_JSON_RE = /["'](videoId|video_id|youtubeId|youtube_id|vimeoId|vimeo_id|videoKey|media_id)["']\s*:\s*["'][a-zA-Z0-9_\-]{5,}/i;
  for (const s of doc.querySelectorAll('script:not([src])')) {
    const txt = s.textContent || '';
    if (VIDEO_PLATFORM_RE.test(txt) || PLAYER_INIT_RE.test(txt) || VIDEO_ID_JSON_RE.test(txt))
      return { found: true, signal: 'inline player init script' };
  }

  // ── 12. <noscript> content — WordPress / Elementor stores actual embeds ──
  for (const ns of doc.querySelectorAll('noscript')) {
    const inner = ns.innerHTML || '';
    if (VIDEO_PLATFORM_RE.test(inner) || /<video[\s>]/i.test(inner))
      return { found: true, signal: 'noscript embed' };
  }

  // ── 13. HTML comments — Gutenberg/WP block: <!-- wp:embed {"url":"..."} -->
  try {
    const walker = doc.createTreeWalker(doc, NodeFilter.SHOW_COMMENT);
    let c;
    while ((c = walker.nextNode())) {
      if (VIDEO_PLATFORM_RE.test(c.nodeValue || ''))
        return { found: true, signal: 'HTML comment embed' };
    }
  } catch (_) {}

  return { found: false, signal: null };
}

// ── Stock photo CDN detection ──────────────────────────────────────────────
// Returns 'stock' | 'real' | null (null = not enough signal)
const STOCK_CDN_RE = /shutterstock\.com|gettyimages\.(com|co\.uk)|istockphoto\.com|stock\.adobe\.com|depositphotos\.com|dreamstime\.com|123rf\.com|bigstockphoto\.com|alamy\.com|unsplash\.com\/photos\/|pexels\.com\/photo\/|pixabay\.com\/photos\//i;

// Stock filename patterns — common in self-hosted stock photos
const STOCK_FILENAME_RE = /shutterstock|istock|istockphoto|gettyimages|getty[-_]|depositphotos|dreamstime|123rf|bigstock|adobe[-_]?stock|stock[-_]?photo|royalty[-_]?free/i;

// Real photo filename signals — dates, event names, org-specific naming
const REAL_FILENAME_RE = /\b(20\d\d[-_]?\d{2}[-_]?\d{2}|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)|\b(event|program|volunteer|team|staff|community|client|family|graduation|gala|visit|field|trip|award|ceremony|celebration|workshop|training|outreach|impact)\b/i;

// Generic alt text = stock signal (describes the concept, not the moment)
const GENERIC_ALT_RE = /^(photo|image|picture|img|banner|hero|background|slide|icon|logo|placeholder|stock\s+photo|man|woman|person|people|group|team|happy|smiling|diverse|professional|business|concept|abstract)[\s,.]?$/i;

// Rich alt text = real photo signal (describes who/what/where specifically)
const REAL_ALT_RE = /\b(our|we|us|program|client|participant|volunteer|staff|community|neighbor|family|child|youth|recipient|beneficiar|resident|member|student|donor|graduate|survivor|veteran)\b/i;

function scoreImageUrl(url, alt) {
  // url and alt may be empty strings
  let stockScore = 0;
  let realScore  = 0;

  if (url) {
    if (STOCK_CDN_RE.test(url))     stockScore += 3;
    if (STOCK_FILENAME_RE.test(url)) stockScore += 2;
    if (REAL_FILENAME_RE.test(url))  realScore  += 2;
    // Self-hosted on the org's own domain = mild real signal
    if (/wp-content\/uploads|\/images\/|\/media\/|\/photos\/|\/assets\//i.test(url)) realScore += 1;
  }

  if (alt) {
    const trimmed = alt.trim();
    if (!trimmed || trimmed.length < 4) {
      stockScore += 1; // empty/missing alt is a mild stock signal
    } else if (GENERIC_ALT_RE.test(trimmed)) {
      stockScore += 2;
    } else if (REAL_ALT_RE.test(trimmed)) {
      realScore  += 3;
    } else if (trimmed.length > 20) {
      realScore  += 1; // descriptive alt = good sign
    }
  }

  return { stockScore, realScore };
}

function detectPhotos(doc, raw, jinaText, mlOgImage) {
  let totalStockScore = 0;
  let totalRealScore  = 0;
  let imageCount      = 0;

  // ── A. Parse Jina markdown for image references: ![alt](url) ─────────────
  if (jinaText) {
    const jinaImgRe = /!\[([^\]]*)\]\(([^)]+)\)/g;
    let m;
    while ((m = jinaImgRe.exec(jinaText)) !== null) {
      const [, alt, url] = m;
      if (/^data:/.test(url)) continue;
      imageCount++;
      const s = scoreImageUrl(url, alt);
      totalStockScore += s.stockScore;
      totalRealScore  += s.realScore;
    }
  }

  // ── B. Microlink og:image ─────────────────────────────────────────────────
  if (mlOgImage) {
    const s = scoreImageUrl(mlOgImage, '');
    totalStockScore += s.stockScore;
    totalRealScore  += s.realScore;
    imageCount = Math.max(imageCount, 1);
  }

  // ── C. DOM scan ───────────────────────────────────────────────────────────
  if (doc) {
    for (const img of doc.querySelectorAll('img')) {
      const src = img.getAttribute('src') || img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || '';
      const alt = img.getAttribute('alt') || '';
      if (!src || /^data:image\/gif/.test(src)) continue;
      const w = parseInt(img.getAttribute('width')  || '0');
      const h = parseInt(img.getAttribute('height') || '0');
      if ((w > 0 && w < 40) || (h > 0 && h < 40)) continue;
      imageCount++;
      const s = scoreImageUrl(src, alt);
      totalStockScore += s.stockScore;
      totalRealScore  += s.realScore;
    }
  }

  // ── D. Raw HTML fallback ──────────────────────────────────────────────────
  if (raw && imageCount === 0) {
    if (STOCK_CDN_RE.test(raw) || STOCK_FILENAME_RE.test(raw)) totalStockScore += 2;
    const rawImgs = raw.match(/<img\b[^>]+>/gi) || [];
    imageCount = rawImgs.length;
    // Try to score alt text from raw HTML
    rawImgs.forEach(tag => {
      const altM = tag.match(/alt=["']([^"']*)["']/i);
      const srcM = tag.match(/src=["']([^"']*)["']/i) || tag.match(/data-src=["']([^"']*)["']/i);
      const s = scoreImageUrl(srcM?.[1] || '', altM?.[1] || '');
      totalStockScore += s.stockScore;
      totalRealScore  += s.realScore;
    });
  }

  if (imageCount === 0) return null; // no images at all

  // ── Score decision ────────────────────────────────────────────────────────
  if (totalStockScore > totalRealScore && totalStockScore >= 3) return 'stock';
  if (totalRealScore  > totalStockScore)                        return 'real';
  if (totalStockScore > 0)                                      return 'stock';
  if (imageCount > 0)                                           return 'real'; // images exist, no strong stock signal
  return null;
}

// ── Microlink API — JS-rendered metadata ──────────────────────────────────
// waitFor=5000 tells Microlink's headless browser to wait 5s after load for
// JS to inject iframes and players before capturing metadata.
async function fetchMicrolink(url) {
  try {
    const apiUrl = `https://api.microlink.io/?url=${encodeURIComponent(url)}&video=true&screenshot=false&waitFor=5000`;
    const resp = await Promise.race([
      fetch(apiUrl),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 15000)),
    ]);
    if (!resp.ok) return null;
    const data = await resp.json();
    return data?.data || null;
  } catch (_) { return null; }
}

// ── Flesch-Kincaid helpers ─────────────────────────────────────────────────

// Count syllables in a word using a heuristic (accurate enough for FK scoring)
function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (word.length <= 3) return 1;
  word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const m = word.match(/[aeiouy]{1,2}/g);
  return m ? m.length : 1;
}

// Count sentences — split on . ! ? followed by whitespace or end
function countSentences(text) {
  const matches = text.match(/[^.!?]*[.!?]+/g);
  return matches ? matches.length : 1;
}

// Flesch Reading Ease: 206.835 - 1.015*(words/sentences) - 84.6*(syllables/words)
// Returns { score, label, key, pts }
function fleschKincaid(text) {
  // Strip HTML artifacts and normalize whitespace
  const clean = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  if (clean.length < 100) return null; // not enough text

  const wordList  = clean.split(/\s+/).filter(w => w.replace(/[^a-zA-Z]/g, '').length > 0);
  const wordCount = wordList.length;
  if (wordCount < 30) return null;

  const sentenceCount  = Math.max(countSentences(clean), 1);
  const syllableCount  = wordList.reduce((sum, w) => sum + countSyllables(w), 0);

  const score = Math.round(
    206.835
    - 1.015  * (wordCount / sentenceCount)
    - 84.6   * (syllableCount / wordCount)
  );

  // Clamp to 0–100 display range
  const clamped = Math.max(0, Math.min(100, score));

  if (clamped >= 60) return { score: clamped, label: `8th grade level (FK ${clamped})`,     key: 'easy',     pts: 10 };
  if (clamped >= 40) return { score: clamped, label: `10th grade level (FK ${clamped})`,    key: 'moderate', pts: 7  };
  if (clamped >= 20) return { score: clamped, label: `College level (FK ${clamped})`,       key: 'college',  pts: 4  };
  return               { score: clamped, label: `Academic / jargon (FK ${clamped})`,        key: 'hard',     pts: 0  };
}

// Detect bot-challenge / empty proxy responses
function isUsableHtml(text) {
  if (!text || text.length < 500) return false;
  // Reject known bot-challenge pages
  if (/Just a moment|checking your browser|Enable JavaScript and cookies|cf-browser-verification|DDoS protection by/i.test(text)) return false;
  // Reject if no real HTML body content
  if (!/<(p|div|section|article|main|h[1-6]|span|a)\b/i.test(text)) return false;
  return true;
}

// Strip script/style block contents from raw HTML before text extraction
function stripScriptsAndStyles(html) {
  return html
    .replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, ' ')
    .replace(/<style\b[^>]*>[\s\S]*?<\/style>/gi, ' ')
    .replace(/<[^>]+>/g, ' ')
    .replace(/&[a-z#0-9]+;/gi, ' ')
    .replace(/\s+/g, ' ');
}

// ── Authorship detection ───────────────────────────────────────────────────
function detectAuthorship(doc, raw) {
  let text;
  if (raw) {
    text = stripScriptsAndStyles(raw);
  } else if (doc?.body) {
    try {
      const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          const tag = node.parentElement?.tagName?.toLowerCase();
          return (tag === 'script' || tag === 'style') ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT;
        }
      });
      const parts = []; let n;
      while ((n = walker.nextNode())) parts.push(n.nodeValue);
      text = parts.join(' ');
    } catch(_) { text = doc.body.textContent || ''; }
  } else {
    text = '';
  }

  const len = text.trim().length;
  if (len === 0) return { found: false, signal: 'no text extracted' };

  const try_ = (label, re) => re.test(text) ? { found: true, signal: label } : null;

  return (
    try_('salutation',      /\b(sincerely|with gratitude|warmly|in service|with appreciation|yours truly|in mission|respectfully|with hope|with love|in solidarity|gratefully)[,\s]/i) ||
    try_('dear opener',     /\bdear\s+(friend|donor|supporter|partner|community|stakeholder|neighbor|colleague|reader)/i) ||
    try_('message from',    /\b(message|letter|note|word|foreword|introduction|welcome)\s+(from|by)\b/i) ||
    try_('from the desk',   /\bfrom\s+the\s+(desk|office)\s+of\b/i) ||
    try_('leadership title',/\b(executive director|chief executive|board (chair|member|president)|vice president|vp\s+of|founder|co-founder|chief operating|chief development|development director|program director|communications director|director of (programs?|development|operations|communications|finance))\b/i) ||
    try_('abbrev title',    /[,|\n]\s*(ED|CEO|COO|CFO|CTO|CDO|board\s+chair|exec\.?\s+dir\.?)\b/i) ||
    try_('written by',      /\b(signed|authored|written|prepared|submitted|compiled|presented|report)\s+by\b/i) ||
    try_('as your leader',  /\bas (your|our)\s+(executive director|president|CEO|director|founder|chair)\b/i) ||
    try_('first person',    /\bI am (proud|excited|pleased|delighted|honored|humbled|grateful)\b/i) ||
    try_('staff section',   /\b(our\s+)?(team|staff|leadership)\b[^.]{0,60}\b(director|president|founder|officer|coordinator|manager)\b/i) ||
    { found: false, signal: `no match in ${len} chars` }
  );
}

// ── Storytelling detection ─────────────────────────────────────────────────
// Returns 'named' (individual story), 'group' (cohort/project story), or null (skip to manual)
function detectStorytelling(doc, raw) {
  const text = raw ? stripScriptsAndStyles(raw) : (doc?.body?.textContent || '');
  if (!text) return null;

  // ── NAMED individual signals ──────────────────────────────────────────────

  // "Meet [Name]" — classic named-story intro
  if (/\bmeet\s+[A-Z][a-z]{2,}\b/.test(text)) return 'named';

  // "[FirstName]'s story" — possessive story headline
  if (/\b[A-Z][a-z]{2,}['']s\s+story\b/.test(text)) return 'named';

  // "[FirstName], a [specific human descriptor]"
  if (/\b[A-Z][a-z]{2,},\s+a\s+(single mother|single father|homeless|formerly homeless|refugee|asylum seeker|cancer survivor|veteran|first-generation|low-income|domestic violence survivor|foster child|foster youth)\b/.test(text)) return 'named';

  // "[First Last], [age/role descriptor]"
  if (/\b[A-Z][a-z]{2,}\s+[A-Z][a-z]{2,},\s+(age\s+\d|a\s+(mother|father|student|veteran|refugee|survivor|child|youth|resident|client|participant))\b/.test(text)) return 'named';

  // Quoted speech attributed to a specific first+last name: "…" — First Last
  if (/["""]\s*—\s*[A-Z][a-z]{2,}\s+[A-Z][a-z]{2,}/.test(text)) return 'named';

  // "[Name] came to us..." or "[Name] was struggling..." — named narrative opening
  if (/\b[A-Z][a-z]{2,}\s+(came to us|walked into|was referred|reached out|contacted us|was struggling|had nowhere|didn['']t know|lost (her|his|their))\b/.test(text)) return 'named';

  // ── GROUP / PROJECT story signals ─────────────────────────────────────────

  // "X families/students/people [verb]..." — aggregate outcome narrative
  if (/\b\d+\s+(families|households|students|children|youth|adults|seniors|veterans|refugees|clients|participants|individuals)\s+(received|found|completed|graduated|accessed|secured|enrolled|gained|moved)\b/i.test(text)) return 'group';

  // "families like [Name]'s" or "people like [Name]" — group framing with a token name
  if (/\b(families|people|individuals|students|clients)\s+like\s+[A-Z][a-z]{2,}['']s?\b/.test(text)) return 'group';

  // "the [ProgramName] program" or "our [X] initiative/project" with an outcome
  if (/\b(the|our)\s+[A-Z][A-Za-z\s]{2,20}\s+(program|initiative|project|cohort|campaign)\b.*\b(helped|served|reached|supported|impacted|changed|transformed)\b/is.test(text)) return 'group';

  // "together, we..." or "as a community..." — collective story framing
  if (/\b(together,?\s+we|as a community|as a (family|village|team)|our community came together)\b/i.test(text)) return 'group';

  // "this year, [number] [people]..." — year-in-review narrative framing
  if (/\bthis (year|season)\b.{0,60}\b\d+\s+(people|families|individuals|youth|students|clients|participants)\b/is.test(text)) return 'group';

  return null;
}

// ── Continuity detection ───────────────────────────────────────────────────
// Looks for future-engagement promises: "next year", newsletter CTAs, social follow prompts
function detectContinuity(doc, raw) {
  const text = (raw ? stripScriptsAndStyles(raw) : (doc?.body?.textContent || '')).toLowerCase();
  if (!text) return null;

  if (/\b(next year|coming (year|months|season)|in 20\d\d)\b/.test(text)) return true;
  if (/\b(sign up|subscribe|newsletter|email updates?|stay (connected|in touch|informed))\b/.test(text)) return true;
  if (/\b(follow us|join us|be part of|upcoming (event|gala|campaign))\b/.test(text)) return true;
  if (/\b(what'?s next|looking ahead|our (vision|goals?) for|future (plans?|impact))\b/.test(text)) return true;

  // Social media links or handles
  if (doc) {
    for (const a of doc.querySelectorAll('a[href]')) {
      if (/facebook\.com|twitter\.com|instagram\.com|linkedin\.com|tiktok\.com/i.test(a.getAttribute('href') || ''))
        return true;
    }
  }
  if (/facebook\.com|twitter\.com|instagram\.com|linkedin\.com/i.test(text)) return true;

  return false;
}

// ── Jina AI Reader — JS-rendered page text ────────────────────────────────
// r.jina.ai executes JavaScript and returns clean text, including iframe titles
// and any video platform URLs that appear in the rendered DOM.
async function fetchJina(url) {
  try {
    const resp = await Promise.race([
      fetch(`https://r.jina.ai/${encodeURIComponent(url)}`, {
        headers: { 'Accept': 'text/plain', 'X-Return-Format': 'text' }
      }),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 14000)),
    ]);
    if (!resp.ok) return null;
    const text = await resp.text();
    return text.length > 100 ? text : null;
  } catch (_) { return null; }
}

// Try multiple CORS proxies, return { html, proxyUsed } or null
async function fetchViaProxy(url) {
  const proxies = [
    { name: 'allorigins',  url: `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
    { name: 'corsproxy',   url: `https://corsproxy.io/?${encodeURIComponent(url)}` },
    { name: 'codetabs',    url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}` },
  ];
  for (const proxy of proxies) {
    try {
      const resp = await Promise.race([
        fetch(proxy.url),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000)),
      ]);
      if (resp.ok) {
        const text = await resp.text();
        if (isUsableHtml(text)) return { html: text, proxyUsed: proxy.name };
      }
    } catch (_) { /* try next */ }
  }
  return null;
}

async function runAnalysis() {
  const isUrl = reportSource?.type === 'url';
  let doc        = null; // parsed HTML document
  let rawHtml    = '';   // raw HTML string
  let mlData     = null; // Microlink API response data

  // ── Kick off all fetches in parallel during countdown ────────────────────
  let proxyPromise     = null;
  let microlinkPromise = null;
  let jinaPromise      = null;
  if (isUrl) {
    proxyPromise     = fetchViaProxy(reportSource.label);
    microlinkPromise = fetchMicrolink(reportSource.label);
    jinaPromise      = fetchJina(reportSource.label);
  }

  // ── 15-second countdown — cycles tips, fills progress bar left-to-right ──
  const WAIT       = 15;
  const TIP_EVERY  = Math.ceil(WAIT / TIPS.length); // seconds per tip
  let   tipIndex   = -1;

  function showNextTip() {
    tipIndex = (tipIndex + 1) % TIPS.length;
    const tip      = TIPS[tipIndex];
    const card     = document.getElementById('tip-card');
    const catEl    = document.getElementById('tip-category');
    const textEl   = document.getElementById('tip-text');
    if (!card) return;
    // Fade out
    card.classList.remove('tip-visible');
    setTimeout(() => {
      if (catEl)  catEl.textContent  = tip.category;
      if (textEl) textEl.textContent = tip.text;
      // Fade in
      card.classList.add('tip-visible');
    }, 420);
  }

  showNextTip(); // show first tip immediately
  for (let elapsed = 1; elapsed <= WAIT; elapsed++) {
    await delay(1000);
    const bar = document.getElementById('countdown-bar');
    if (bar) bar.style.width = ((elapsed / WAIT) * 100) + '%';
    // Rotate tip at each interval
    if (elapsed % TIP_EVERY === 0 && elapsed < WAIT) showNextTip();
  }
  // Hide countdown, show checks
  const cw = document.getElementById('countdown-wrap');
  if (cw) cw.style.display = 'none';
  const cl = document.getElementById('check-list');
  if (cl) { cl.style.opacity = '1'; cl.style.pointerEvents = 'auto'; }
  const title = document.querySelector('.analyzing-title');
  if (title) title.textContent = 'Analysing your report…';
  const sub = document.querySelector('.analyzing-sub');
  if (sub) sub.textContent = 'Auto-detecting criteria where possible.';

  // ── Resolve fetch results (all should be done by now) ───────────────────
  let jinaText = null;
  if (isUrl) {
    const [fetched, ml, jina] = await Promise.all([proxyPromise, microlinkPromise, jinaPromise]);
    if (fetched) {
      rawHtml = fetched.html;
      const parser = new DOMParser();
      doc = parser.parseFromString(rawHtml, 'text/html');
    }
    mlData   = ml;
    jinaText = jina;
  } else if (uploadedFile) {
    if (/\.html?$/i.test(uploadedFile.name)) {
      try {
        rawHtml = await uploadedFile.text();
        const parser = new DOMParser();
        doc = parser.parseFromString(rawHtml, 'text/html');
      } catch (_) {}
    }
  }

  // ── 1. Format ────────────────────────────────────────────────────────────
  await showCheck('format', 400);
  if (isUrl) {
    const url = reportSource.label;
    const isPdfUrl = /\.pdf(\?.*)?$/i.test(url);
    if (isPdfUrl) {
      setDetected('interactivity', 'pdf',          4, 'Static PDF');
      finishCheck('format', false, 'PDF link detected (+4 pts)');
    } else {
      setDetected('interactivity', 'interactive', 10, 'Fully digital / web-based');
      finishCheck('format', true, 'Web page detected (+10 pts)');
    }
  } else {
    if (uploadedFile && /\.html?$/i.test(uploadedFile.name)) {
      setDetected('interactivity', 'interactive', 10, 'Fully digital / web-based');
      finishCheck('format', true, 'HTML file detected (+10 pts)');
    } else {
      setDetected('interactivity', 'pdf', 4, 'Static PDF');
      finishCheck('format', false, 'PDF file (+4 pts)');
    }
  }

  // ── 2. Length estimation ─────────────────────────────────────────────────
  // Uses word count as a proxy for pages/scrolls:
  // ~500 words ≈ 2 scrolls/pages, ~1250 words ≈ 5 scrolls/pages
  await showCheck('length', 400);
  {
    const lengthText = jinaText || (doc ? doc.body?.textContent : null) || rawHtml;
    if (lengthText) {
      const cleaned   = lengthText.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      const wordCount = cleaned.split(/\s+/).filter(w => w.length > 1).length;
      if (wordCount <= 500) {
        setDetected('length', 'short',  10, '2 pages / scrolls or less');
        finishCheck('length', true,  `~${wordCount} words — very concise (+10 pts)`);
      } else if (wordCount <= 1250) {
        setDetected('length', 'medium',  5, 'Up to 5 pages / scrolls');
        finishCheck('length', true,  `~${wordCount} words — reasonable length (+5 pts)`);
      } else {
        setDetected('length', 'long',    0, 'More than 5 pages / scrolls');
        finishCheck('length', false, `~${wordCount} words — may be too long (+0 pts)`);
      }
    } else {
      skipCheck('length', 'Couldn\'t estimate — please answer manually');
    }
  }

  // ── 3. Video detection ───────────────────────────────────────────────────
  await showCheck('video', 500);
  {
    let videoFound  = false;
    let videoSignal = null;

    // A. Jina Reader — renders JavaScript, returns text with iframe/embed info
    if (jinaText) {
      if (VIDEO_PLATFORM_RE.test(jinaText))
        { videoFound = true; videoSignal = 'Jina JS-rendered scan'; }
      // Jina renders iframe titles like "YouTube video player" in its output
      else if (/youtube\s*(video\s*)?(player|embed)|vimeo\s*(player|embed)|video\s+player/i.test(jinaText))
        { videoFound = true; videoSignal = 'Jina rendered video player'; }
    }

    // B. Microlink structured fields
    if (!videoFound && mlData) {
      if (mlData.video?.url || mlData.video?.html || mlData.video?.type) {
        videoFound = true; videoSignal = 'Microlink video metadata';
      }
      if (!videoFound) {
        try {
          const mlJson = JSON.stringify(mlData);
          if (VIDEO_PLATFORM_RE.test(mlJson))
            videoFound = true, videoSignal = 'Microlink JSON video URL';
        } catch (_) {}
      }
    }

    // B. Deep scan of CORS-proxy HTML + expanded heuristics
    if (!videoFound && (doc || rawHtml)) {
      if (rawHtml) {
        if (/youtube\.com\/iframe_api|youtube\.com\/player_api/i.test(rawHtml))
          { videoFound = true; videoSignal = 'YouTube IFrame API'; }
        else if (/wistia_async_[a-z0-9]+/i.test(rawHtml))
          { videoFound = true; videoSignal = 'Wistia async embed'; }
        else if (/data-video(?:-id)?=["'][a-zA-Z0-9_\-]{8,}["']/i.test(rawHtml))
          { videoFound = true; videoSignal = 'data-video-id attr'; }
        else if (/class="[^"]*(?:wp-block-embed|video-block|video-embed|video-wrapper|yt-embed|video-container|embed-responsive|fluid-width-video)[^"]*"/i.test(rawHtml))
          { videoFound = true; videoSignal = 'embed container class'; }
        else if (/ytInitialData|ytInitialPlayerResponse/i.test(rawHtml))
          { videoFound = true; videoSignal = 'YouTube page data'; }
      }
      if (!videoFound) {
        const vr = detectVideo(doc, rawHtml);
        if (vr.found) { videoFound = true; videoSignal = vr.signal; }
      }
    }

    // Static document platforms — these never have embedded video, safe to auto-set
    const isStaticDocPlatform = isUrl && /issuu\.com|fliphtml5\.com|flipsnack\.com|heyzine\.com|joomag\.com|publuu\.com|calameo\.com|yumpu\.com/i.test(reportSource.label);

    if (videoFound) {
      const isLinkOnly = videoSignal === 'link to video platform';
      if (isLinkOnly) {
        setDetected('multimedia', 'link', 5, 'Link out to video');
        finishCheck('video', true, `Video link found (+5 pts) [${videoSignal}]`);
      } else {
        setDetected('multimedia', 'embed', 10, 'Embedded video / player');
        finishCheck('video', true, `Video embed detected (+10 pts) [${videoSignal}]`);
      }
    } else if (isStaticDocPlatform) {
      // Issuu, FlipHTML5, Flipsnack etc. are static document viewers — no video possible
      setDetected('multimedia', 'no', 0, 'No video');
      finishCheck('video', false, 'Static document platform — no video (+0 pts)');
    } else {
      // Neither Microlink nor CORS proxy could confirm video presence.
      // CORS proxies return static HTML (JS embeds invisible), and Microlink
      // free tier doesn't reliably render all players. Never auto-set "no video"
      // — leave for manual review so the user can answer accurately.
      skipCheck('video', 'Couldn\'t auto-detect — please answer manually');
    }
  }

  // ── 3. Photo quality detection ───────────────────────────────────────────
  await showCheck('photos', 500);
  {
    let photoResult = null;

    // detectPhotos handles all sources: Jina markdown, mlOgImage, DOM, raw HTML
    if (doc || rawHtml || jinaText || mlData?.image?.url) {
      photoResult = detectPhotos(doc, rawHtml, jinaText, mlData?.image?.url || null);
    }

    if (photoResult === 'stock') {
      setDetected('visuals', 'stock_good', 7, 'Stock photography (well chosen)');
      finishCheck('photos', true, 'Stock photos detected (+7 pts)');
    } else if (photoResult === 'real') {
      setDetected('visuals', 'real', 10, 'High-quality, original photos');
      finishCheck('photos', true, 'Real photos detected (+10 pts)');
    } else {
      skipCheck('photos', 'Manual review needed');
    }
  }

  // ── 4. Links (4-tier count) ──────────────────────────────────────────────
  await showCheck('links', 400);
  if (doc) {
    const extLinks = [...doc.querySelectorAll('a[href]')].filter(a =>
      /^https?:\/\//i.test(a.getAttribute('href') || '')
    ).length;
    if (extLinks >= 3) {
      setDetected('connectivity', 'three_plus', 10, '3 or more strategic links');
      finishCheck('links', true, `${extLinks} external links found (+10 pts)`);
    } else if (extLinks === 2) {
      setDetected('connectivity', 'two', 7, '2 links');
      finishCheck('links', true, `2 external links found (+7 pts)`);
    } else if (extLinks === 1) {
      setDetected('connectivity', 'one', 4, '1 link');
      finishCheck('links', true, `1 external link found (+4 pts)`);
    } else {
      setDetected('connectivity', 'none', 0, 'No links');
      finishCheck('links', false, 'No external links found');
    }
  } else {
    skipCheck('links', 'Manual review needed');
  }

  // ── 5. The Ask — reversed: no ask = best (4-tier) ────────────────────────
  await showCheck('cta', 450);
  if (doc) {
    const donateEls = [...doc.querySelectorAll('a, button')].filter(el =>
      /donat|give\s+now|contribut|support\s+us|fund\s+us/i.test((el.getAttribute('href') || '') + ' ' + (el.textContent || ''))
    );
    const ctaCount = donateEls.length;
    if (ctaCount === 0) {
      setDetected('conversion', 'no_ask', 10, 'No ask — pure gratitude');
      finishCheck('cta', true, 'No donate ask — pure gratitude (+10 pts)');
    } else if (ctaCount <= 2) {
      setDetected('conversion', 'soft', 7, 'Soft link (no call-out)');
      finishCheck('cta', true, `${ctaCount} subtle donate link(s) (+7 pts)`);
    } else if (ctaCount <= 5) {
      setDetected('conversion', 'hard', 4, 'Hard ask ("Donate Now")');
      finishCheck('cta', false, `${ctaCount} donate CTAs — prominent ask (+4 pts)`);
    } else {
      setDetected('conversion', 'aggressive', 0, 'Aggressive / multiple asks');
      finishCheck('cta', false, `${ctaCount} donate prompts — aggressive ask`);
    }
  } else {
    skipCheck('cta', 'Manual review needed');
  }

  // ── 6. Readability (Flesch-Kincaid, 4-tier) ──────────────────────────────
  await showCheck('readability', 400);
  if (jinaText || rawHtml || doc) {
    const text = jinaText
      ? jinaText
      : rawHtml
        ? stripScriptsAndStyles(rawHtml)
        : (doc.body?.textContent || '');
    const fk = fleschKincaid(text);
    if (fk) {
      setDetected('readability', fk.key, fk.pts, fk.label);
      const grade = fk.pts === 10 ? '8th grade' : fk.pts === 7 ? '10th grade' : fk.pts === 4 ? 'College' : 'Academic';
      finishCheck('readability', fk.pts >= 7, `FK ${fk.score} — ${grade} (+${fk.pts} pts)`);
    } else {
      skipCheck('readability', 'Not enough text to score');
    }
  } else {
    skipCheck('readability', 'Manual review needed');
  }

  // ── 7. You vs. We language (4-tier) ──────────────────────────────────────
  await showCheck('donor_lang', 400);
  const langText = jinaText
    ? jinaText.toLowerCase()
    : rawHtml
      ? stripScriptsAndStyles(rawHtml).toLowerCase()
      : (doc?.body?.textContent || '').toLowerCase();

  if (langText.length > 200) {
    const youWords = (langText.match(/\byou\b|\byour\b|\byours\b|\byourself\b/g) || []).length;
    const weWords  = (langText.match(/\bwe\b|\bour\b|\bours\b|\bus\b|\bwe've\b|\bwe're\b|\bwe'll\b|\bwe'd\b/g) || []).length;
    const total    = youWords + weWords;
    detectedLangCounts = { you: youWords, we: weWords };

    if (total >= 5) {
      const ratio = youWords / (weWords || 1);
      const pct   = Math.round((youWords / total) * 100);

      if (ratio >= 1.5) {
        setDetected('donor_centricity', 'high_you', 10, `High "You" — donor is the hero`);
        finishCheck('donor_lang', true, `${youWords} "you" vs ${weWords} "we" — donor-centric (+10 pts)`);
      } else if (ratio >= 0.8) {
        setDetected('donor_centricity', 'balanced', 7, 'Balanced "You" and "We"');
        finishCheck('donor_lang', true, `${youWords} "you" vs ${weWords} "we" — balanced (+7 pts)`);
      } else if (ratio >= 0.3) {
        setDetected('donor_centricity', 'high_we', 4, 'High "We / I" — org is the hero');
        finishCheck('donor_lang', false, `${youWords} "you" vs ${weWords} "we" — org-centric (+4 pts)`);
      } else {
        setDetected('donor_centricity', 'cold', 0, 'Cold / institutional voice');
        finishCheck('donor_lang', false, `${youWords} "you" vs ${weWords} "we" — institutional`);
      }
    } else if (total > 0) {
      // Some pronouns found but too few to be confident — score conservatively
      const ratio = youWords / (weWords || 1);
      if (ratio >= 1.0) {
        setDetected('donor_centricity', 'balanced', 7, 'Balanced "You" and "We"');
        finishCheck('donor_lang', true, `${youWords} "you" vs ${weWords} "we" — leaning donor-centric (+7 pts)`);
      } else {
        setDetected('donor_centricity', 'high_we', 4, 'High "We / I" — org is the hero');
        finishCheck('donor_lang', false, `${youWords} "you" vs ${weWords} "we" — leaning org-centric (+4 pts)`);
      }
    } else {
      skipCheck('donor_lang', 'Not enough pronoun instances to score');
    }
  } else {
    skipCheck('donor_lang', 'Manual review needed');
  }

  // ── 8. Authorship ────────────────────────────────────────────────────────
  await showCheck('authorship', 400);
  // Prefer Jina text (clean rendered output) over raw HTML for text-based checks
  const authorSource = jinaText || rawHtml;
  const authorDoc    = jinaText ? null : doc;
  if (authorSource || authorDoc) {
    const { found: authorFound, signal: authorSignal } = detectAuthorship(authorDoc, authorSource);
    if (authorFound) {
      setDetected('authorship', 'ed', 7, 'Executive Director / CEO');
      finishCheck('authorship', true, `Leadership found (+7 pts) [${authorSignal}]`);
    } else {
      skipCheck('authorship', `Couldn't confirm — please answer manually`);
    }
  } else {
    skipCheck('authorship', 'Manual review needed');
  }

  // ── 9. Storytelling ──────────────────────────────────────────────────────
  await showCheck('storytelling', 400);
  const storySource = jinaText || rawHtml;
  const storyDoc    = jinaText ? null : doc;
  if (storySource || storyDoc) {
    const storyLevel = detectStorytelling(storyDoc, storySource);
    if (storyLevel === 'named') {
      setDetected('storytelling', 'named', 10, 'Named individual story');
      finishCheck('storytelling', true, 'Named individual story detected (+10 pts)');
    } else if (storyLevel === 'group') {
      setDetected('storytelling', 'group', 5, 'Group or project story');
      finishCheck('storytelling', true, 'Group/project story detected (+5 pts)');
    } else {
      skipCheck('storytelling', 'Couldn\'t confirm — please answer manually');
    }
  } else {
    skipCheck('storytelling', 'Manual review needed');
  }

  // ── 10. Mobile responsiveness ────────────────────────────────────────────
  await showCheck('mobile', 400);
  if (isUrl) {
    // Check for viewport meta tag (required for responsive design)
    const hasViewport = rawHtml
      ? /<meta[^>]+name=["']viewport["'][^>]*>/i.test(rawHtml)
      : (doc ? !!doc.querySelector('meta[name="viewport"]') : false);

    // Check for responsive CSS signals
    const hasMediaQuery = rawHtml ? /@media\s*\(/.test(rawHtml) : false;
    const hasFlexGrid   = rawHtml ? /display\s*:\s*(flex|grid)/i.test(rawHtml) : false;
    const hasResponsiveClass = rawHtml
      ? /col-\w+|container-fluid|row\b|flex-wrap|w-full|max-w-|sm:|md:|lg:/i.test(rawHtml)
      : false;

    if (!hasViewport) {
      // No viewport meta = definitely not mobile-friendly
      setDetected('mobile', 'none', 0, 'Not mobile friendly');
      finishCheck('mobile', false, 'No viewport meta tag found (+0 pts)');
    } else if (hasMediaQuery || hasFlexGrid || hasResponsiveClass) {
      setDetected('mobile', 'responsive', 10, 'Fully responsive');
      finishCheck('mobile', true, 'Responsive design detected (+10 pts)');
    } else {
      // Has viewport but no clear responsive signals — may be partial
      setDetected('mobile', 'partial', 5, 'Partially responsive');
      finishCheck('mobile', true, 'Viewport tag found, responsiveness unclear (+5 pts)');
    }
  } else if (uploadedFile && /\.pdf$/i.test(uploadedFile.name)) {
    // PDFs are not mobile-friendly by nature
    setDetected('mobile', 'none', 0, 'Not mobile friendly');
    finishCheck('mobile', false, 'PDFs don\'t scale on mobile (+0 pts)');
  } else {
    skipCheck('mobile', 'Couldn\'t auto-detect — please answer manually');
  }

  // ── Done — copy detected into answers, show review screen ───────────────
  for (const [id, val] of Object.entries(detected)) {
    answers[id] = val;
  }

  await delay(600);
  screen = 'review';
  render();
  scrollToGrader();
}

// Check helpers
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function showCheck(id, ms) {
  const el = document.getElementById(`chk-${id}`);
  const ic = document.getElementById(`chk-icon-${id}`);
  if (el) el.classList.add('running');
  if (ic) ic.textContent = '⏳';
  await delay(ms);
}

function finishCheck(id, passed, resultText) {
  const el  = document.getElementById(`chk-${id}`);
  const ic  = document.getElementById(`chk-icon-${id}`);
  const res = document.getElementById(`chk-res-${id}`);
  if (!el) return;
  el.classList.remove('running');
  el.classList.add(passed ? 'pass' : 'fail');
  if (ic)  ic.textContent  = passed ? '✅' : '⚠️';
  if (res) res.textContent = resultText || '';
}

function skipCheck(id, resultText) {
  const el  = document.getElementById(`chk-${id}`);
  const ic  = document.getElementById(`chk-icon-${id}`);
  const res = document.getElementById(`chk-res-${id}`);
  if (!el) return;
  el.classList.remove('running');
  el.classList.add('skip');
  if (ic)  ic.textContent  = '❓';
  if (res) res.textContent = resultText || 'Manual';
}

function setDetected(questionId, key, pts, label) {
  detected[questionId] = { key, pts, label, auto: true };
}

// ── Review screen ─────────────────────────────────────────────────────────
function renderReview() {
  const score       = Math.min(calcScore(), 100);
  const answeredAll = QUESTIONS.every(q => answers[q.id]);
  const autoCount   = Object.keys(detected).length;
  const unanswered  = QUESTIONS.filter(q => !answers[q.id]).length;

  const rows = QUESTIONS.map(q => {
    const ans          = answers[q.id];
    const earned       = ans ? ans.pts : 0;
    const isAuto       = !!detected[q.id];
    const needsManual  = !ans; // highlight any unanswered row
    const state        = !ans ? 'unanswered' : earned > 0 ? 'scored' : 'unscored';
    const ptsTxt       = !ans ? '? pts' : `${earned > 0 ? '+' : ''}${earned} / ${q.maxPts} pts`;
    const langSuffix   = (q.id === 'donor_centricity' && detectedLangCounts)
      ? ` · ${detectedLangCounts.you} "you" vs ${detectedLangCounts.we} "we"`
      : '';
    const ansLabel = ans ? ans.label + langSuffix : 'Tap Edit to answer';

    const optionsHtml = q.type === 'yn'
      ? `<div class="edit-yn-grid">
          ${q.options.map((o, i) => {
            const sel = ans && ans.key === o.key;
            const cls = sel ? (o.pts > 0 ? 'sel-pos' : 'sel-neg') : '';
            return `<button class="edit-opt-btn ${cls}" onclick="reviewSelectAnswer('${q.id}', ${i})">
              <span class="edit-opt-icon">${o.icon}</span>
              <span>${o.label}</span>
              <span class="edit-opt-pts">${o.pts > 0 ? '+' + o.pts : '0'} pts</span>
            </button>`;
          }).join('')}
        </div>`
      : `<div class="edit-mc-list">
          ${q.options.map((o, i) => {
            const sel = ans && ans.key === o.key;
            const cls = sel ? (o.pts > 0 ? 'sel-pos' : 'sel-neg') : '';
            return `<button class="edit-opt-btn ${cls}" onclick="reviewSelectAnswer('${q.id}', ${i})">
              <span class="edit-opt-icon">${o.icon}</span>
              <div style="flex:1;text-align:left">
                <div>${o.label}</div>
                ${o.sub ? `<div style="font-size:11px;color:var(--gray-500);margin-top:1px">${o.sub}</div>` : ''}
              </div>
              <span class="edit-opt-pts">${o.pts > 0 ? '+' + o.pts : '0'} pts</span>
            </button>`;
          }).join('')}
        </div>`;

    return `
      <div class="review-row ${needsManual ? 'review-row-needs-answer' : ''}" id="rrow-${q.id}">
        <div class="review-row-summary" onclick="toggleEditPanel('${q.id}')">
          <div class="review-row-icon ${state}">${q.icon}</div>
          <div class="review-row-body">
            <div class="review-row-label">
              ${q.label}
              ${isAuto ? '<span class="review-auto-badge">🤖 auto</span>' : ''}
              ${needsManual ? '<span class="review-manual-badge">👆 Tap to answer</span>' : ''}
            </div>
            <div class="review-row-answer" id="rans-${q.id}">${ansLabel}</div>
          </div>
          <div class="review-row-right">
            <span class="review-pts-badge ${state}" id="rpts-${q.id}">${ptsTxt}</span>
            <button class="review-edit-btn" id="redit-${q.id}" onclick="event.stopPropagation();toggleEditPanel('${q.id}')">✏️ Edit</button>
          </div>
        </div>
        <div class="review-edit-panel" id="repanel-${q.id}">
          <div class="edit-panel-inner">
            <div class="edit-panel-hint">${q.hint}</div>
            ${optionsHtml}
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="review-card">
      <div class="review-header">
        <h2>Initial Results</h2>
        <p>
          ${autoCount > 0 ? `We auto-detected <strong>${autoCount} criteria</strong> from your report.` : `Couldn't auto-detect criteria from this report.`}
          ${unanswered > 0 ? ` We need your input on <strong>${unanswered} more question${unanswered !== 1 ? 's' : ''}</strong> to finalise your grade.` : ' All criteria detected — review and edit any row if needed.'}
        </p>
        <div class="review-score-pill">
          <span>Score so far: <strong id="review-score-num">${score}</strong> / 100</span>
          <span class="pill-pts">${unanswered > 0 ? `${unanswered} question${unanswered !== 1 ? 's' : ''} remaining` : 'All answered ✓'}</span>
        </div>
      </div>

      <div class="review-rows">${rows}</div>

      <div class="review-footer">
        <button class="btn-back" onclick="screen='input';render();scrollToGrader();">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back
        </button>
        <button class="btn-next btn-submit" id="review-submit-btn" onclick="submitReview()">
          ${unanswered > 0 ? `Answer ${unanswered} Question${unanswered !== 1 ? 's' : ''}` : 'Get Final Grade'}
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>
  `;
}

function toggleEditPanel(qid) {
  const panel = document.getElementById(`repanel-${qid}`);
  const btn   = document.getElementById(`redit-${qid}`);
  if (!panel) return;

  const isOpen = panel.classList.contains('open');

  // Close any currently open panel
  if (openPanel && openPanel !== qid) {
    const prev = document.getElementById(`repanel-${openPanel}`);
    const prevBtn = document.getElementById(`redit-${openPanel}`);
    if (prev) prev.classList.remove('open');
    if (prevBtn) { prevBtn.classList.remove('open'); prevBtn.textContent = '✏️ Edit'; }
  }

  panel.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '✏️ Edit' : '✕ Close';
  openPanel = isOpen ? null : qid;
}

function reviewSelectAnswer(qid, optionIdx) {
  const q   = QUESTIONS.find(q => q.id === qid);
  const opt = q.options[optionIdx];
  answers[qid] = { key: opt.key, pts: opt.pts, label: opt.label };

  // If user edits, remove auto tag
  delete detected[qid];

  // Update option buttons in panel
  const panel = document.getElementById(`repanel-${qid}`);
  if (panel) {
    panel.querySelectorAll('.edit-opt-btn').forEach((btn, i) => {
      btn.classList.remove('sel-pos', 'sel-neg');
      if (i === optionIdx) btn.classList.add(q.options[i].pts > 0 ? 'sel-pos' : 'sel-neg');
    });
  }

  // Update row summary
  const earned = opt.pts;
  const state  = earned > 0 ? 'scored' : 'unscored';

  const iconEl = document.querySelector(`#rrow-${qid} .review-row-icon`);
  if (iconEl) { iconEl.className = `review-row-icon ${state}`; }

  const ansEl = document.getElementById(`rans-${qid}`);
  if (ansEl) ansEl.textContent = opt.label;

  const ptsEl = document.getElementById(`rpts-${qid}`);
  if (ptsEl) {
    ptsEl.textContent = `${earned > 0 ? '+' : ''}${earned} / ${q.maxPts} pts`;
    ptsEl.className   = `review-pts-badge ${state}`;
  }

  // Remove auto badge from label if present
  const autoTag = document.querySelector(`#rrow-${qid} .review-auto-badge`);
  if (autoTag) autoTag.remove();

  // Update running score pill
  const scoreNum = document.getElementById('review-score-num');
  if (scoreNum) scoreNum.textContent = Math.min(calcScore(), 100);

  // Update unanswered count in header pill
  const unanswered = QUESTIONS.filter(q => !answers[q.id]).length;
  const pill = document.querySelector('.review-score-pill .pill-pts');
  if (pill) pill.textContent = unanswered > 0 ? `${unanswered} not yet answered` : 'All answered ✓';

  // Auto-close panel after selection
  setTimeout(() => toggleEditPanel(qid), 320);
}

function submitReview() {
  // If there are unanswered questions, step through them before calculating
  const unanswered = QUESTIONS.filter(q => !answers[q.id]);
  if (unanswered.length > 0) {
    // Set current to the first unanswered question
    current = QUESTIONS.indexOf(unanswered[0]);
    screen = 'question';
  } else {
    screen = 'calculating';
  }
  render();
  scrollToGrader();
}

// ── Question screen ────────────────────────────────────────────────────────
function renderQuestion() {
  const q      = QUESTIONS[current];
  const sel    = answers[q.id];
  const isAuto = !!detected[q.id];
  const runningScore = Math.min(calcScore(), 100);

  // Only show dots/progress for unanswered questions
  const unanswered  = getUnansweredQuestions();
  const unansweredIdx = unanswered.indexOf(q);
  const totalSteps    = unanswered.length;
  const isLast        = unansweredIdx === totalSteps - 1 || unanswered.slice(unansweredIdx + 1).length === 0;
  const pct           = totalSteps > 1 ? Math.round((unansweredIdx / (totalSteps - 1)) * 100) : 100;

  const dots = unanswered.map((uq, i) => {
    const cls = i < unansweredIdx ? 'done' : i === unansweredIdx ? 'active' : '';
    return `<div class="step-dot ${cls}"></div>`;
  }).join('');

  // Auto-detected banner
  const autoBanner = isAuto ? `
    <div class="auto-detected-banner" id="auto-banner">
      <span class="adb-icon">🤖</span>
      <div class="adb-body">
        <div class="adb-title">Auto-detected from your report</div>
        <div class="adb-sub">We found this automatically. Review it below and change if needed.</div>
      </div>
      <button class="adb-edit" onclick="unlockQuestion()">Edit</button>
    </div>
  ` : '';

  const optionsClass = isAuto ? 'options-locked' : 'options-unlocked';

  const optionsHtml = q.type === 'yn'
    ? `<div class="yn-grid ${optionsClass}" id="options-wrap">
        ${q.options.map((o, i) => {
          let cls = '';
          if (sel) cls = sel.key === o.key ? (o.pts > 0 ? 'sel-pos' : 'sel-neg') : '';
          return `<button class="yn-btn ${cls}" onclick="selectAnswer('${q.id}', ${i})">
            <span class="yn-icon">${o.icon}</span>
            <span class="yn-label">${o.label}</span>
            <span class="yn-pts">${o.pts > 0 ? '+' + o.pts + ' pts' : '0 pts'}</span>
          </button>`;
        }).join('')}
      </div>`
    : `<div class="mc-list ${optionsClass}" id="options-wrap">
        ${q.options.map((o, i) => {
          let cls = '';
          if (sel) cls = sel.key === o.key ? (o.pts > 0 ? 'sel-pos' : 'sel-neg') : '';
          return `<button class="mc-btn ${cls}" onclick="selectAnswer('${q.id}', ${i})">
            <div class="mc-radio"></div>
            <span class="mc-icon">${o.icon}</span>
            <div class="mc-text">
              <div class="mc-label">${o.label}</div>
              ${o.sub ? `<div class="mc-sub">${o.sub}</div>` : ''}
            </div>
            <span class="mc-pts">${o.pts > 0 ? '+' + o.pts + ' pts' : '0 pts'}</span>
          </button>`;
        }).join('')}
      </div>`;

  return `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-label">Question ${unansweredIdx + 1} of ${totalSteps} to answer</span>
        <span class="progress-count">${pct}% complete</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-steps">${dots}</div>
      ${current > 0 ? `<div class="potential-score ${runningScore > 0 ? 'boosted' : ''}" id="running-score">
        Running score: <strong>${runningScore} / ${maxAnswered()} pts answered</strong>
      </div>` : ''}
    </div>

    <div class="card">
      <div class="question-category">${q.icon} ${q.label} &nbsp;·&nbsp; up to ${q.maxPts} pts</div>
      ${autoBanner}
      <div class="question-text">${q.question}</div>
      <div class="question-hint">${q.hint}</div>
      ${optionsHtml}
      <div class="card-footer">
        <button class="btn-back" onclick="goBack()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back
        </button>
        <button class="btn-next ${isLast ? 'btn-submit' : ''}" id="next-btn"
                onclick="${isLast ? 'submitQuiz()' : 'goNext()'}"
                ${!sel ? 'disabled' : ''}>
          ${isLast ? 'Calculate My Score' : 'Next'}
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="${isLast ? 'M9 11l3 3L22 4' : 'M5 12h14M12 5l7 7-7 7'}"/>
            ${isLast ? '<path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>' : ''}
          </svg>
        </button>
      </div>
    </div>
  `;
}

function unlockQuestion() {
  const wrap   = document.getElementById('options-wrap');
  const banner = document.getElementById('auto-banner');
  if (wrap)   { wrap.classList.remove('options-locked'); wrap.classList.add('options-unlocked'); }
  if (banner) banner.remove();
}

// ── Calculating screen ─────────────────────────────────────────────────────
function renderCalculating() {
  return `
    <div class="calc-card">
      <div class="calc-spinner-wrap">
        <div class="calc-spinner"></div>
        <div class="calc-spinner-icon">📊</div>
      </div>
      <div class="calc-title">Calculating your score…</div>
      <div class="calc-sub">Benchmarking your report against best-in-class standards.</div>
      <div class="calc-steps" id="calc-steps">
        ${QUESTIONS.map((q) => {
          const pts = earnedPts(q.id);
          const isAuto = !!detected[q.id];
          return `
            <div class="calc-step ${pts === 0 ? 'zero-pts' : ''}" id="cs-${q.id}">
              <span class="calc-step-icon">${q.icon}</span>
              <span>${q.label}${isAuto ? ' <span style="font-size:10px;color:var(--blue-light);font-weight:700;">AUTO</span>' : ''}</span>
              <span class="calc-step-pts" id="csp-${q.id}">${pts > 0 ? '+' + pts : '0'} / ${q.maxPts} pts</span>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function runCalcAnimation() {
  const stepDelay = 260;
  QUESTIONS.forEach((q, i) => {
    setTimeout(() => {
      const el = document.getElementById(`cs-${q.id}`);
      if (el) el.classList.add('active');
    }, i * stepDelay);
    setTimeout(() => {
      const el  = document.getElementById(`cs-${q.id}`);
      const pts = document.getElementById(`csp-${q.id}`);
      if (el)  { el.classList.remove('active'); el.classList.add('done'); }
      if (pts)   pts.style.opacity = '1';
    }, i * stepDelay + stepDelay - 40);
  });

  const totalTime = QUESTIONS.length * stepDelay + 400;
  setTimeout(() => { screen = 'results'; render(); scrollToGrader(); }, totalTime);
}

// ── Results screen ─────────────────────────────────────────────────────────
function renderLangBar({ you, we }) {
  const total   = you + we || 1;
  const youPct  = Math.round((you / total) * 100);
  const wePct   = 100 - youPct;
  const targetMet = youPct >= 55; // donor-centric if majority is "you" words

  return `
    <div style="margin: 10px 0 6px; background: var(--off-white); border: 1px solid var(--gray-100); border-radius: 10px; padding: 12px 14px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span style="font-size:12px; font-weight:700; color:var(--navy);">You vs. We word count</span>
        <span style="font-size:11px; font-weight:600; color:var(--gray-500);">${you + we} pronouns scanned</span>
      </div>
      <div style="display:flex; height:10px; border-radius:10px; overflow:hidden; gap:2px;">
        <div style="width:${youPct}%; background:${targetMet ? 'var(--success)' : 'var(--blue-light)'}; border-radius:10px 0 0 10px; transition:width 1s ease; min-width:4px;"></div>
        <div style="flex:1; background:${targetMet ? 'var(--gray-300)' : 'var(--danger)'}; border-radius:0 10px 10px 0;"></div>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:6px;">
        <span style="font-size:12px; font-weight:700; color:${targetMet ? '#166534' : 'var(--blue-light)'};">
          "You/Your" — ${you} words (${youPct}%)
        </span>
        <span style="font-size:12px; font-weight:700; color:${targetMet ? 'var(--gray-500)' : '#991b1b'};">
          "We/Our" — ${we} words (${wePct}%)
        </span>
      </div>
      <div style="font-size:11px; color:var(--gray-500); margin-top:5px;">
        ${targetMet
          ? '✅ Majority donor-focused language. Keep it up.'
          : `⚡ Aim for at least 55% "you" language. Currently at ${youPct}%.`}
      </div>
    </div>
  `;
}

function renderResults() {
  const score      = calcScore();
  const displayScore = Math.min(score, 100);
  const tier       = getTier(score);
  const pct        = Math.min((score / MAX_SCORE) * 100, 100);
  const passCount  = Object.values(answers).filter(a => a && a.pts > 0).length;
  const failCount  = QUESTIONS.length - passCount;
  const autoCount  = Object.keys(detected).length;

  const breakdown = QUESTIONS.map(q => {
    const ans    = answers[q.id];
    const earned = ans ? ans.pts : 0;
    const passed = earned > 0;
    const wasAuto = !!detected[q.id];
    return `
      <div class="criterion-row">
        <div class="criterion-icon ${passed ? 'pass' : 'fail'}">${q.icon}</div>
        <div class="criterion-body">
          <div class="criterion-top">
            <div>
              <span class="criterion-label">${q.label}</span>
              ${wasAuto ? '<span class="auto-badge">🤖 auto</span>' : ''}
              ${ans ? `<div class="criterion-chosen">"${ans.label}"</div>` : ''}
            </div>
            <span class="criterion-badge ${passed ? 'pass' : 'fail'}">
              ${passed ? '+' + earned + ' pts' : '0 / ' + q.maxPts + ' pts'}
            </span>
          </div>
          <div class="criterion-insight">${passed ? q.passInsight : q.failInsight}</div>
          ${q.id === 'donor_centricity' && detectedLangCounts ? renderLangBar(detectedLangCounts) : ''}
          <div class="insight-callout ${passed ? 'good' : 'bad'}">
            <span class="ic-icon">${passed ? '✅' : '⚡'}</span>
            <span>${passed ? q.passStat.replace('✅ ', '') : q.failStat.replace('⚡ ', '')}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const strategyItems = QUESTIONS
    .filter(q => q.strategy && answers[q.id] && answers[q.id].pts === 0)
    .map((q, idx) => `
      <div class="strategy-card" style="animation-delay:${idx * 80}ms">
        <div class="strategy-card-icon">${q.icon}</div>
        <div class="strategy-card-body">
          <div class="strategy-card-label">${q.label}</div>
          <div class="strategy-card-text">${q.strategy}</div>
        </div>
      </div>
    `).join('');

  const strategySection = strategyItems ? `
    <div class="section-title" style="margin-top:32px;">Strategy Breakdown</div>
    <div class="strategy-list">${strategyItems}</div>
  ` : '';

  return `
    <div class="results-card">
      <div class="results-header ${tier.headerClass}">
        <div class="results-eyebrow">Your Impact Report Score</div>
        <div class="tier-badge ${tier.badgeClass}"><span class="tier-icon">${tier.icon}</span>${tier.label}</div>
        <div class="score-display">
          <span class="score-number" id="score-num">0</span><span class="score-number score-max"> / 100</span>
        </div>
        <div class="results-headline">${tier.headline}</div>
        <div class="results-subhead">${tier.subhead}</div>
        <div class="score-bar-outer">
          <div class="score-bar-track">
            <div class="score-bar-fill ${tier.badgeClass}" id="score-bar" style="width:0%"></div>
          </div>
          <div class="score-bar-zones">
            <div class="zone zone-static">Static / Traditional (0–59)</div>
            <div class="zone zone-engaging">Engaging (60–85)</div>
            <div class="zone zone-pro">Pro</div>
          </div>
        </div>
      </div>

      <div class="results-body">
        <div class="cta-box">
          <h3>${tier.ctaHeadline}</h3>
          <p>${tier.ctaBody}</p>
          <div class="cta-btns">
            <a href="https://meetings.hubspot.com/harkov/reportstrategycall" target="_blank" rel="noopener" class="btn-primary-cta">Book a Free Strategy Call</a>
            <button class="btn-secondary-cta" onclick="shareScore(${displayScore}, '${tier.label}')">Share My Score</button>
          </div>
        </div>

        <div class="summary-bar" style="margin-top:24px;">
          <div class="summary-stat"><strong>${displayScore}</strong><span>Out of 100</span></div>
          <div class="summary-stat"><strong style="color:var(--success)">${passCount}</strong><span>Criteria passed</span></div>
          <div class="summary-stat"><strong style="color:var(--blue-light)">${autoCount}</strong><span>Auto-detected</span></div>
        </div>

        <div class="section-title" style="margin-top:24px;">Criterion-by-criterion breakdown</div>
        ${breakdown}
        ${strategySection}

        <button class="restart-btn" onclick="restartQuiz()">← Grade a different report</button>
      </div>
    </div>
  `;
}

function animateResults() {
  const score        = calcScore();
  const displayScore = Math.min(score, 100);
  const pct          = Math.min((score / MAX_SCORE) * 100, 100);
  requestAnimationFrame(() => {
    setTimeout(() => {
      const bar  = document.getElementById('score-bar');
      if (bar) bar.style.width = pct + '%';
      const numEl    = document.getElementById('score-num');
      const duration = 1300;
      const start    = performance.now();
      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased    = 1 - Math.pow(1 - progress, 3);
        if (numEl) numEl.textContent = Math.round(eased * displayScore);
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }, 80);
  });
}

// ── Navigation ─────────────────────────────────────────────────────────────
function selectAnswer(qid, optionIdx) {
  const q   = QUESTIONS.find(q => q.id === qid);
  const opt = q.options[optionIdx];
  answers[qid] = { key: opt.key, pts: opt.pts, label: opt.label };

  // Remove auto lock since user explicitly chose
  delete detected[qid];

  if (q.type === 'yn') {
    document.querySelectorAll('.yn-btn').forEach((btn, i) => {
      btn.classList.remove('sel-pos', 'sel-neg');
      if (i === optionIdx) btn.classList.add(q.options[i].pts > 0 ? 'sel-pos' : 'sel-neg');
    });
  } else {
    document.querySelectorAll('.mc-btn').forEach((btn, i) => {
      btn.classList.remove('sel-pos', 'sel-neg');
      if (i === optionIdx) btn.classList.add(q.options[i].pts > 0 ? 'sel-pos' : 'sel-neg');
    });
  }

  const ticker = document.getElementById('running-score');
  if (ticker) {
    const rs = Math.min(calcScore(), 100);
    ticker.innerHTML = `Running score: <strong>${rs} / 100 pts</strong>`;
    ticker.classList.toggle('boosted', opt.pts > 0);
  }

  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.disabled = false;
}

function getUnansweredQuestions() {
  return QUESTIONS.filter(q => !answers[q.id]);
}

function goNext() {
  if (!answers[QUESTIONS[current].id]) return;
  // Find next unanswered question after current index
  const nextUnanswered = QUESTIONS.slice(current + 1).find(q => !answers[q.id]);
  if (nextUnanswered) {
    current = QUESTIONS.indexOf(nextUnanswered);
    render();
    scrollToGrader();
  } else {
    screen = 'calculating';
    render();
    scrollToGrader();
  }
}

function goBack() {
  // Find previous unanswered question before current index
  const prevUnanswered = QUESTIONS.slice(0, current).reverse().find(q => !answers[q.id]);
  if (prevUnanswered) {
    current = QUESTIONS.indexOf(prevUnanswered);
    render();
    scrollToGrader();
  } else {
    screen = 'review';
    render();
    scrollToGrader();
  }
}

function submitQuiz() {
  if (!answers[QUESTIONS[current].id]) return;
  screen = 'calculating';
  render();
  scrollToGrader();
}

function restartQuiz() {
  screen = 'input'; current = 0; answers = {}; detected = {};
  uploadedFile = null; reportSource = null; openPanel = null; detectedLangCounts = null;
  render(); scrollToGrader();
}

function scrollToGrader() {
  const el = document.getElementById('grader');
  if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
}

function shareScore(score, tier) {
  const text = `I just graded my nonprofit's impact report with Storyraise: ${score}/100 — "${tier}" tier. How does yours score? storyraise.com`;
  if (navigator.share) {
    navigator.share({ title: 'My Impact Report Score', text });
  } else {
    navigator.clipboard.writeText(text)
      .then(() => alert('Score copied to clipboard!'))
      .catch(() => alert(text));
  }
}

render();
renderJourneyBar();
</script>

<!-- Journey progress bar -->
<div class="journey-bar" id="journey-bar" style="display:none">
  <div class="journey-inner">
    <div class="journey-step" id="jstep-upload">
      <div class="journey-dot">1</div>
      <div class="journey-label">Upload Report</div>
    </div>
    <div class="journey-step" id="jstep-review">
      <div class="journey-dot">2</div>
      <div class="journey-label">Initial Results</div>
    </div>
    <div class="journey-step" id="jstep-grade">
      <div class="journey-dot">3</div>
      <div class="journey-label">Final Grade</div>
    </div>
  </div>
</div>

<script>
function renderJourneyBar() {
  const bar = document.getElementById('journey-bar');
  if (!bar) return;

  // Hide on the very first input screen
  if (screen === 'input') { bar.style.display = 'none'; return; }
  bar.style.display = 'block';

  const steps = ['upload','review','grade'];
  const stepEl = s => document.getElementById(`jstep-${s}`);

  // Determine which stage we're in
  // upload = analyzing
  // review = review or question
  // grade  = calculating or results
  let active;
  if (screen === 'analyzing')            active = 'upload';
  else if (screen === 'review' || screen === 'question') active = 'review';
  else                                    active = 'grade';

  const order = ['upload','review','grade'];
  const activeIdx = order.indexOf(active);

  order.forEach((s, i) => {
    const el = stepEl(s);
    if (!el) return;
    el.classList.remove('active','done');
    if (i < activeIdx)       el.classList.add('done');
    else if (i === activeIdx) el.classList.add('active');
    // Mark done dot with checkmark
    const dot = el.querySelector('.journey-dot');
    if (dot) dot.textContent = i < activeIdx ? '✓' : i + 1;
  });
}
</script>

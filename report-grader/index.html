<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impact Report Grader — Storyraise</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #000000;
      --navy-mid:    #803BB1;
      --blue:        #803BB1;
      --blue-light:  #F12E5B;
      --accent:      #F12E5B;
      --teal:        #DDFF1E;
      --white:       #ffffff;
      --off-white:   #ece5f5;
      --gray-100:    #ddd4ec;
      --gray-300:    #cccccc;
      --gray-500:    #888888;
      --gray-700:    #444444;
      --success:     #22c55e;
      --warn:        #f59e0b;
      --danger:      #ef4444;
      --shadow-md:   0 4px 24px rgba(0,0,0,.5);
      --shadow-lg:   0 12px 48px rgba(0,0,0,.7);
      --radius:      16px;
      --radius-sm:   10px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(to bottom, #f5f0fc 0%, #faf8fe 40%, #ffffff 100%);
      background-attachment: fixed;
      color: #000000;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,240,252,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #ddd4ec;
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 900px; margin: 0 auto; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--navy-mid));
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; }
    .logo-text { font-size: 18px; font-weight: 800; color: #000000; letter-spacing: -.4px; }
    .logo-text span { color: var(--accent); }
    .nav-badge {
      font-size: 12px; font-weight: 600; color: var(--accent);
      background: rgba(241,46,91,.15); padding: 5px 12px; border-radius: 20px;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(160deg, #803BB1 0%, #9b4fd4 40%, #b06ae0 100%);
      padding: 72px 24px 80px;
      text-align: center; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 55% 50% at 10% 65%, rgba(241,46,91,.2) 0%, transparent 65%),
        radial-gradient(ellipse 50% 55% at 90% 20%, rgba(221,255,30,.12) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 110%, rgba(0,0,0,.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    .hero-inner { position: relative; max-width: 680px; margin: 0 auto; }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: #F12E5B; border: 1px solid #F12E5B;
      border-radius: 20px; padding: 6px 16px; margin-bottom: 24px;
    }
    .hero-tag-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; animation: pulse 2s infinite; }
    .hero-tag span { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: .08em; text-transform: uppercase; }
    .hero h1 { font-size: clamp(32px, 5vw, 52px); font-weight: 900; color: var(--white); line-height: 1.15; letter-spacing: -.03em; margin-bottom: 20px; }
    .hero h1 em { font-style: normal; color: var(--accent); }
    .hero p { font-size: 18px; color: rgba(255,255,255,.72); max-width: 520px; margin: 0 auto 36px; line-height: 1.65; }
    .hero-cta {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--navy-mid));
      color: var(--white); font-size: 16px; font-weight: 700;
      padding: 14px 32px; border-radius: 50px; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(241,46,91,.4); transition: transform .2s, box-shadow .2s;
    }
    .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(241,46,91,.5); }
    .hero-stats { display: flex; justify-content: center; gap: 40px; margin-top: 52px; flex-wrap: wrap; }
    .hero-stat strong { display: block; font-size: 28px; font-weight: 900; color: var(--white); letter-spacing: -.04em; }
    .hero-stat span { font-size: 13px; color: rgba(255,255,255,.55); font-weight: 500; }
    .hero-stat-divider { width: 1px; height: 40px; background: rgba(255,255,255,.12); align-self: center; }

    /* ── Quiz section ── */
    .quiz-section { max-width: 640px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ── Input card ── */
    .input-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow-md); border: 1px solid var(--gray-100);
      overflow: hidden; animation: slideUp .35s cubic-bezier(.4,0,.2,1);
    }
    .input-tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--gray-100);
    }
    .input-tab {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 16px; font-size: 14px; font-weight: 700; color: var(--gray-500);
      background: var(--white); border: none; cursor: pointer;
      border-bottom: 3px solid transparent; transition: all .2s;
    }
    .input-tab .tab-icon { font-size: 17px; }
    .input-tab:hover { color: var(--navy); background: var(--off-white); }
    .input-tab.active { color: var(--blue-light); border-bottom-color: var(--blue-light); background: var(--white); }

    .input-body { padding: 32px 36px 28px; }

    /* URL input */
    .url-panel, .file-panel { display: none; }
    .url-panel.active, .file-panel.active { display: block; }

    .input-label { font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 8px; }
    .url-field-wrap { position: relative; }
    .url-field {
      width: 100%; padding: 13px 46px 13px 16px;
      border-radius: var(--radius-sm); border: 2px solid var(--gray-100);
      font-size: 15px; color: var(--navy); background: var(--off-white);
      outline: none; transition: border-color .2s, background .2s;
      font-family: inherit;
    }
    .url-field:focus { border-color: var(--blue-light); background: var(--white); }
    .url-field.error { border-color: var(--danger); }
    .url-field-icon {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 18px; pointer-events: none;
    }
    .url-error { font-size: 12px; color: var(--danger); margin-top: 6px; display: none; }
    .url-error.show { display: block; }

    /* File drop zone */
    .drop-zone {
      border: 2px dashed var(--gray-300); border-radius: var(--radius-sm);
      padding: 36px 24px; text-align: center; cursor: pointer;
      transition: all .2s; background: var(--off-white); position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--blue-light); background: rgba(241,46,91,.04);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 36px; margin-bottom: 12px; }
    .drop-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .drop-sub { font-size: 13px; color: var(--gray-500); }
    .drop-sub span { color: var(--blue-light); font-weight: 600; text-decoration: underline; text-underline-offset: 2px; }

    .file-chosen {
      display: none; align-items: center; gap: 12px;
      background: rgba(34,197,94,.07); border: 1px solid rgba(34,197,94,.25);
      border-radius: var(--radius-sm); padding: 12px 16px; margin-top: 12px;
    }
    .file-chosen.show { display: flex; }
    .file-chosen-icon { font-size: 22px; }
    .file-chosen-name { font-size: 14px; font-weight: 600; color: #166534; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-chosen-clear { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--gray-500); padding: 0 4px; flex-shrink: 0; }
    .file-chosen-clear:hover { color: var(--danger); }

    /* What's auto-detected note */
    .auto-detect-note {
      display: flex; align-items: flex-start; gap: 10px;
      background: rgba(221,255,30,.04); border: 1px solid rgba(221,255,30,.18);
      border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 20px;
    }
    .adn-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .adn-text { font-size: 12px; line-height: 1.55; color: var(--gray-700); }
    .adn-text strong { color: var(--teal); }

    .input-footer { padding: 0 36px 28px; }
    .btn-analyze {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px; border-radius: 50px;
      font-size: 16px; font-weight: 700; color: var(--white);
      background: linear-gradient(135deg, var(--accent), var(--navy-mid));
      border: none; cursor: pointer;
      box-shadow: 0 4px 16px rgba(241,46,91,.4); transition: all .2s;
    }
    .btn-analyze:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(241,46,91,.5); }
    .btn-analyze:disabled { opacity: .45; cursor: default; transform: none; box-shadow: none; }

    /* ── Analyzing screen ── */
    .analyzing-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); padding: 44px 40px 36px;
      border: 1px solid var(--gray-100);
      animation: fadeIn .3s ease;
    }
    .analyzing-source {
      display: flex; align-items: center; gap: 10px;
      background: var(--off-white); border: 1px solid var(--gray-100);
      border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 28px;
    }
    .analyzing-source-icon { font-size: 18px; flex-shrink: 0; }
    .analyzing-source-label { font-size: 13px; font-weight: 600; color: var(--navy); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .analyzing-spinner-wrap { position: relative; width: 80px; height: 80px; margin: 0 auto 20px; }
    .analyzing-spinner {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid var(--gray-100);
      border-top-color: var(--blue-light);
      border-right-color: var(--accent);
      animation: spin 1s linear infinite;
    }
    .analyzing-spinner-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 26px; }
    .analyzing-title { font-size: 20px; font-weight: 800; color: var(--navy); letter-spacing: -.03em; margin-bottom: 6px; text-align: center; }
    .analyzing-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 20px; text-align: center; }
    .countdown-wrap { margin-bottom: 24px; }
    .countdown-bar-bg { width: 100%; height: 4px; background: var(--gray-100); border-radius: 10px; overflow: hidden; margin-top: 14px; }
    .countdown-bar-fill {
      height: 100%; width: 100%; border-radius: 10px;
      background: linear-gradient(90deg, var(--blue-light), var(--accent));
      transition: width 1s linear;
    }

    /* Tip card shown during countdown */
    .tip-card {
      background: linear-gradient(135deg, #000000 0%, #1a0030 100%);
      border-radius: var(--radius-sm); padding: 18px 20px; margin-bottom: 0;
      min-height: 90px; position: relative; overflow: hidden;
    }
    .tip-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 10% 50%, rgba(221,255,30,.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .tip-category {
      font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 7px; opacity: 0;
      transition: opacity .4s ease;
    }
    .tip-text {
      font-size: 13px; line-height: 1.6; color: rgba(255,255,255,.88);
      opacity: 0; transition: opacity .4s ease;
    }
    .tip-card.tip-visible .tip-category,
    .tip-card.tip-visible .tip-text { opacity: 1; }

    .check-list { display: flex; flex-direction: column; gap: 8px; }
    .check-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: var(--radius-sm);
      background: var(--off-white); font-size: 13px; font-weight: 600;
      color: var(--gray-500); transition: all .3s;
    }
    .check-item.running { color: var(--navy); background: rgba(241,46,91,.08); }
    .check-item.pass    { color: #166534;    background: rgba(34,197,94,.07); }
    .check-item.fail    { color: #991b1b;    background: rgba(239,68,68,.06); }
    .check-item.skip    { color: var(--gray-500); background: var(--off-white); opacity: .6; }
    .check-icon { font-size: 17px; width: 24px; text-align: center; flex-shrink: 0; }
    .check-result {
      margin-left: auto; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      background: var(--gray-100); color: var(--gray-500);
      opacity: 0; transition: opacity .3s; white-space: nowrap;
    }
    .check-item.pass .check-result { opacity: 1; background: rgba(34,197,94,.15); color: #166534; }
    .check-item.fail .check-result { opacity: 1; background: rgba(239,68,68,.1);  color: #991b1b; }
    .check-item.skip .check-result { opacity: 1; }

    /* ── Progress (question flow) ── */
    .progress-wrap { margin-bottom: 28px; }
    .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-label { font-size: 13px; font-weight: 600; color: var(--gray-500); }
    .progress-count { font-size: 13px; font-weight: 700; color: var(--blue-light); }
    .progress-bar-bg { height: 6px; background: var(--gray-100); border-radius: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue-light), var(--accent)); border-radius: 10px; transition: width .5s cubic-bezier(.4,0,.2,1); }
    .progress-steps { display: flex; gap: 4px; margin-top: 10px; }
    .step-dot { flex: 1; height: 4px; border-radius: 4px; background: var(--gray-100); transition: background .35s; }
    .step-dot.done   { background: var(--blue-light); }
    .step-dot.active { background: var(--accent); }
    .potential-score {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700; color: var(--blue-light);
      background: rgba(241,46,91,.08); padding: 4px 10px; border-radius: 20px; margin-top: 10px;
    }
    .potential-score.boosted { color: #166534; background: rgba(34,197,94,.1); animation: pop .3s ease; }

    /* ── Card ── */
    .card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow-md); padding: 36px 40px 32px;
      border: 1px solid var(--gray-100);
      animation: slideUp .35s cubic-bezier(.4,0,.2,1);
    }
    .question-category {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--blue-light);
      background: rgba(241,46,91,.08); padding: 4px 10px; border-radius: 6px; margin-bottom: 16px;
    }
    .question-text { font-size: clamp(17px, 2.8vw, 22px); font-weight: 800; color: var(--navy); line-height: 1.3; letter-spacing: -.03em; margin-bottom: 8px; }
    .question-hint { font-size: 14px; color: var(--gray-500); margin-bottom: 28px; line-height: 1.55; }

    /* Auto-detected banner */
    .auto-detected-banner {
      display: flex; align-items: flex-start; gap: 10px;
      background: rgba(221,255,30,.05); border: 1px solid rgba(221,255,30,.2);
      border-radius: var(--radius-sm); padding: 11px 14px; margin-bottom: 16px;
      animation: slideDown .25s ease;
    }
    .adb-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .adb-body { flex: 1; }
    .adb-title { font-size: 12px; font-weight: 700; color: var(--teal); margin-bottom: 2px; }
    .adb-sub   { font-size: 12px; color: var(--gray-500); }
    .adb-edit  {
      font-size: 11px; font-weight: 700; color: var(--teal);
      background: none; border: 1px solid rgba(221,255,30,.3);
      padding: 3px 9px; border-radius: 20px; cursor: pointer;
      white-space: nowrap; transition: all .2s; align-self: flex-start;
    }
    .adb-edit:hover { background: rgba(221,255,30,.08); }

    /* ── Option styles ── */
    .yn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .yn-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 22px 14px; border-radius: var(--radius-sm);
      border: 2px solid var(--gray-100); background: var(--white);
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .yn-icon  { font-size: 28px; line-height: 1; transition: transform .2s; }
    .yn-label { font-size: 15px; font-weight: 700; color: var(--gray-700); }
    .yn-pts   { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; background: var(--gray-100); color: var(--gray-500); transition: all .2s; }
    .yn-btn:hover { border-color: var(--blue-light); background: rgba(241,46,91,.04); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(241,46,91,.1); }
    .yn-btn:hover .yn-icon { transform: scale(1.1); }
    .yn-btn.sel-pos { border-color: var(--success); background: rgba(34,197,94,.06); box-shadow: 0 0 0 3px rgba(34,197,94,.12); }
    .yn-btn.sel-pos .yn-label { color: #166534; }
    .yn-btn.sel-pos .yn-pts   { background: rgba(34,197,94,.15); color: #166534; }
    .yn-btn.sel-neg { border-color: var(--gray-300); background: rgba(0,0,0,.02); }
    .yn-btn.sel-neg .yn-label { color: var(--gray-500); }
    .mc-list { display: flex; flex-direction: column; gap: 10px; }
    .mc-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; border-radius: var(--radius-sm);
      border: 2px solid var(--gray-100); background: var(--white);
      cursor: pointer; text-align: left; transition: all .2s; width: 100%;
    }
    .mc-radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--gray-300); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .mc-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; opacity: 0; transition: opacity .2s; }
    .mc-icon  { font-size: 20px; flex-shrink: 0; }
    .mc-text  { flex: 1; }
    .mc-label { font-size: 15px; font-weight: 600; color: var(--gray-700); }
    .mc-sub   { font-size: 12px; color: var(--gray-500); margin-top: 1px; }
    .mc-pts   { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; background: var(--gray-100); color: var(--gray-500); flex-shrink: 0; transition: all .2s; }
    .mc-btn:hover { border-color: var(--blue-light); background: rgba(241,46,91,.04); transform: translateX(3px); }
    .mc-btn.sel-pos { border-color: var(--success); background: rgba(34,197,94,.06); box-shadow: 0 0 0 3px rgba(34,197,94,.1); }
    .mc-btn.sel-pos .mc-radio { background: var(--success); border-color: var(--success); }
    .mc-btn.sel-pos .mc-radio::after { opacity: 1; }
    .mc-btn.sel-pos .mc-label { color: #166534; }
    .mc-btn.sel-pos .mc-pts   { background: rgba(34,197,94,.15); color: #166534; }
    .mc-btn.sel-neg { border-color: var(--gray-300); background: rgba(0,0,0,.02); }
    .mc-btn.sel-neg .mc-radio { background: var(--gray-300); border-color: var(--gray-300); }
    .mc-btn.sel-neg .mc-radio::after { opacity: 1; }
    .mc-btn.sel-neg .mc-label { color: var(--gray-500); }

    /* Locked (auto-detected) options */
    .options-locked { pointer-events: none; opacity: .85; }
    .options-unlocked { pointer-events: auto; opacity: 1; }

    /* ── Card footer ── */
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--gray-100); }
    .btn-back { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; color: var(--gray-500); background: none; border: none; cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: all .2s; }
    .btn-back:hover { color: var(--navy); background: var(--gray-100); }
    .btn-back:disabled { opacity: .3; cursor: default; }
    .btn-next {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 700; color: var(--white);
      background: linear-gradient(135deg, var(--blue-light), var(--blue));
      border: none; padding: 12px 26px; border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(241,46,91,.35); transition: all .2s;
    }
    .btn-next:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(241,46,91,.45); }
    .btn-next:disabled { opacity: .4; cursor: default; transform: none; box-shadow: none; }
    .btn-submit { background: linear-gradient(135deg, var(--accent), var(--navy-mid)); color: var(--white); box-shadow: 0 4px 14px rgba(241,46,91,.4); }
    .btn-submit:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(241,46,91,.5); }

    /* ── Calculating ── */
    .calc-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); padding: 52px 40px;
      border: 1px solid var(--gray-100); animation: fadeIn .4s ease; text-align: center;
    }
    .calc-spinner-wrap { position: relative; width: 96px; height: 96px; margin: 0 auto 24px; }

    /* ── Results ── */

    .results-header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 90% 70% at 50% 110%, rgba(241,46,91,.15), transparent); pointer-events: none; }

    .tier-icon { font-size: 22px; }
    .score-display { position: relative; margin-bottom: 12px; }
    .score-number { font-size: clamp(52px, 8vw, 72px); font-weight: 900; color: var(--white); line-height: 1; letter-spacing: -.05em; }
    .score-number .score-max { font-size: clamp(20px, 3vw, 28px); color: rgba(255,255,255,.35); font-weight: 700; }
    .results-headline { position: relative; font-size: clamp(18px, 3vw, 24px); font-weight: 800; color: var(--white); letter-spacing: -.02em; margin-bottom: 8px; }
    .results-subhead  { position: relative; font-size: 14px; color: rgba(255,255,255,.58); line-height: 1.6; max-width: 460px; margin: 0 auto; }
    .score-bar-outer  { position: relative; margin-top: 28px; }
    .score-bar-track  { height: 10px; background: rgba(255,255,255,.1); border-radius: 10px; overflow: visible; position: relative; }
    .score-bar-fill   { height: 100%; width: 0%; border-radius: 10px; transition: width 1.3s cubic-bezier(.4,0,.2,1) .4s; position: relative; }
    .score-bar-fill::after { content: ''; position: absolute; right: -1px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border-radius: 50%; border: 3px solid var(--white); background: inherit; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
    .score-bar-fill.pro      { background: linear-gradient(90deg, var(--teal), var(--accent)); }
    .score-bar-fill.engaging { background: linear-gradient(90deg, var(--accent), var(--navy-mid)); }
    .score-bar-fill.static   { background: linear-gradient(90deg, #f87171, #fca5a5); }
    .score-bar-zones { display: flex; margin-top: 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: rgba(255,255,255,.3); }
    .zone { text-align: center; }
    .zone-static   { flex: 0 0 53%; }
    .zone-engaging { flex: 0 0 14%; text-align: center; }
    .zone-pro      { flex: 1; text-align: right; }
    .results-body { padding: 32px 40px 40px; }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--gray-500); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--gray-100); }
    .summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .summary-stat { background: var(--off-white); border-radius: var(--radius-sm); padding: 14px 16px; text-align: center; border: 1px solid var(--gray-100); }
    .summary-stat strong { display: block; font-size: 24px; font-weight: 900; color: var(--navy); letter-spacing: -.04em; }
    .summary-stat span   { font-size: 11px; color: var(--gray-500); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .criterion-row { display: flex; align-items: flex-start; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--gray-100); }
    .criterion-row:last-of-type { border-bottom: none; }
    .criterion-icon { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .criterion-icon.pass { background: rgba(34,197,94,.1); }
    .criterion-icon.fail { background: rgba(239,68,68,.07); }
    .criterion-body  { flex: 1; min-width: 0; }
    .criterion-top   { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .criterion-label  { font-size: 14px; font-weight: 700; color: var(--navy); }
    .criterion-chosen { font-size: 12px; color: var(--gray-500); font-style: italic; }
    .criterion-badge  { flex-shrink: 0; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 6px; }
    .criterion-badge.pass { background: rgba(34,197,94,.1); color: #166534; }
    .criterion-badge.fail { background: rgba(239,68,68,.08); color: #991b1b; }
    .auto-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: var(--teal); background: rgba(221,255,30,.1); padding: 2px 7px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
    .criterion-insight { font-size: 13px; line-height: 1.55; color: var(--gray-500); margin-top: 4px; }

      overflow: hidden; animation: slideUp .35s cubic-bezier(.4,0,.2,1);
    }
    .review-header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--gray-100);
    }
    .review-header h2 { font-size: 20px; font-weight: 900; color: var(--navy); letter-spacing: -.03em; margin-bottom: 4px; }
    .review-header p  { font-size: 14px; color: var(--gray-500); }
    .review-score-pill {

      font-size: 12px; font-weight: 800;

    .review-pts-badge.unscored  { background: rgba(239,68,68,.08); color: #991b1b; }

    .review-auto-badge {
      font-size: 10px; font-weight: 700; color: var(--teal);
      background: rgba(221,255,30,.1); padding: 2px 6px; border-radius: 10px;
    }
    .review-manual-badge {
      font-size: 10px; font-weight: 700; color: #92400e;
      background: rgba(245,158,11,.15); border: 1px solid rgba(245,158,11,.3);
      padding: 2px 7px; border-radius: 10px;
    }
    .review-row-needs-answer {
      background: rgba(245,158,11,.03);
    }
    .review-row-needs-answer .review-row-summary {
      border-left: 3px solid var(--warn);
      padding-left: 29px;
    }
    .review-edit-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 700; color: var(--blue-light);

      padding: 5px 12px; border-radius: 20px; cursor: pointer;
      transition: all .2s; white-space: nowrap; flex-shrink: 0;
    }
    .review-edit-btn:hover { background: rgba(241,46,91,.15); }
    .review-edit-btn.open  { background: rgba(241,46,91,.15); }

    /* Inline edit panel */
    .review-edit-panel {
      display: none; padding: 0 32px 20px;

    .edit-panel-inner {
      background: var(--off-white); border-radius: var(--radius-sm);

    /* Compact option buttons inside edit panel */
    .edit-yn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

      display: flex; align-items: center; gap: 10px;

    .edit-opt-btn:hover { border-color: var(--blue-light); background: rgba(241,46,91,.04); }
    .edit-opt-btn.sel-pos { border-color: var(--success); background: rgba(34,197,94,.07); color: #166534; }
    .edit-opt-btn.sel-neg { border-color: var(--gray-300); background: rgba(0,0,0,.02); color: var(--gray-500); }

    .edit-opt-pts  {
      margin-left: auto; font-size: 11px; font-weight: 700;

    .review-footer {

    .strategy-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }

    .cta-box { margin-top: 0; background: linear-gradient(135deg, #000000, #1a0030); border: 1px solid #3d1060; border-radius: var(--radius-sm); padding: 28px 28px 24px; text-align: center; color: var(--white); }

    .journey-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;

      display: flex; flex-direction: column; align-items: center; gap: 4px;
      flex: 1; position: relative;

    .journey-step:not(:last-child)::after {
      content: ''; position: absolute; top: 13px; left: calc(50% + 18px);
      right: calc(-50% + 18px); height: 2px;
      background: #ddd4ec;
      transition: background .4s;
    }
    .journey-step.done:not(:last-child)::after,
    .journey-step.active:not(:last-child)::after {

    .journey-dot {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid #c4b0d8;

      background: #ece5f5; transition: all .3s;

    .journey-step.active .journey-dot {
      border-color: var(--accent); color: var(--accent);

      box-shadow: 0 0 12px rgba(241,46,91,.4);

    .journey-step.done .journey-dot {
      border-color: var(--accent); background: var(--accent);

    }
    .journey-label {
      font-size: 10px; font-weight: 700; color: #9a7cb8; letter-spacing: .04em;

    .journey-step.active .journey-label { color: var(--accent); }
    .journey-step.done .journey-label   { color: var(--gray-500); }

    /* Add bottom padding to quiz section so content isn't hidden behind bar */
    .quiz-section { padding-bottom: 100px !important; }

    /* Animations */
    @keyframes pulse    { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)} }
    @keyframes slideUp  { from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)} }
    @keyframes slideDown{ from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn   { from{opacity:0}to{opacity:1} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes pop      { 0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)} }
    @keyframes badgePop { 0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)} }

    @media (max-width: 520px) {
      .card,.analyzing-card,.calc-card { padding: 22px 18px 20px; }
      .results-header  { padding: 28px 20px; }
      .results-body    { padding: 22px 18px 28px; }

      .hero-stats { gap: 20px; }
      .summary-bar { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>

<script>
// ── Questions ──────────────────────────────────────────────────────────────
const QUESTIONS = [
  {
    id: 'interactivity', label: 'Interactivity', icon: '🖥️', maxPts: 10, type: 'mc',
    question: 'What format is your impact report delivered in?',
    hint: 'How donors receive your report directly affects how long they engage with it.',
    options: [
      { label: 'Fully digital / web-based',     sub: 'Hosted URL, microsite, or digital-first platform', icon: '🌐', pts: 10, key: 'interactive' },

const BASE_SCORE = 0;

function calcScore() {
  return BASE_SCORE + Object.values(answers).reduce((s, a) => s + (a ? a.pts : 0), 0);
}
function earnedPts(qid) { return answers[qid] ? answers[qid].pts : 0; }
function maxAnswered()  { return BASE_SCORE + Object.keys(answers).reduce((s, id) => s + (QUESTIONS.find(q => q.id === id)?.maxPts || 0), 0); }

function render() {
  const root = document.getElementById('quiz-root');
  if      (screen === 'input')      root.innerHTML = renderInput();
  else if (screen === 'analyzing')  { root.innerHTML = renderAnalyzing(); runAnalysis(); }
  else if (screen === 'review')     root.innerHTML = renderReview();
  else if (screen === 'question')   root.innerHTML = renderQuestion();
  else if (screen === 'calculating'){ root.innerHTML = renderCalculating(); runCalcAnimation(); }
  else if (screen === 'results')    { root.innerHTML = renderResults(); animateResults(); }
  if (typeof renderJourneyBar === 'function') renderJourneyBar();
}

function switchTab(tab) {
  document.getElementById('tab-url').classList.toggle('active', tab === 'url');
  document.getElementById('tab-file').classList.toggle('active', tab === 'file');
  document.getElementById('panel-url').classList.toggle('active', tab === 'url');
  document.getElementById('panel-file').classList.toggle('active', tab === 'file');
  updateAnalyzeBtn();
}

function onUrlInput() {
  updateAnalyzeBtn();
  document.getElementById('url-error').classList.remove('show');
  const field = document.getElementById('url-input');
  field.classList.remove('error');
}

function updateAnalyzeBtn() {
  const btn     = document.getElementById('btn-analyze');
  if (!btn) return;
  const urlVal  = (document.getElementById('url-input')?.value || '').trim();
  const fileOk  = !!uploadedFile;
  const urlOk   = urlVal.length > 4;
  const urlTab  = document.getElementById('tab-url')?.classList.contains('active');
  btn.disabled  = urlTab ? !urlOk : !fileOk;
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) setFile(file);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) setFile(file);
}

function setFile(file) {
  uploadedFile = file;
  const nameEl  = document.getElementById('file-chosen-name');
  const chosenEl = document.getElementById('file-chosen');
  if (nameEl)   nameEl.textContent  = file.name;
  if (chosenEl) chosenEl.classList.add('show');
  updateAnalyzeBtn();
}

function clearFile() {
  uploadedFile = null;
  const chosenEl = document.getElementById('file-chosen');
  if (chosenEl) chosenEl.classList.remove('show');
  updateAnalyzeBtn();
}

function submitInput() {
  const urlTab = document.getElementById('tab-url')?.classList.contains('active');
  if (urlTab) {
    const url = (document.getElementById('url-input')?.value || '').trim();
    if (!url.startsWith('http')) {
      const err = document.getElementById('url-error');
      const field = document.getElementById('url-input');
      if (err) err.classList.add('show');
      if (field) field.classList.add('error');
      return;
    }
    reportSource = { type: 'url', label: url };
  } else {
    if (!uploadedFile) return;
    reportSource = { type: 'file', label: uploadedFile.name };
  }
  answers  = {};
  detected = {};
  current  = 0;
  screen   = 'analyzing';
  render();
  scrollToGrader();
}
